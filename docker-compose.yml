version: "3.9"

# ── Development ────────────────────────────────────────────────────────────────
# Usage: docker compose up
# Hot-reloads backend; frontend runs Vite dev server on port 5173.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - xillion-data:/app/data
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite+aiosqlite:///./data/xillion.db
    env_file:
      - .env
    command: uvicorn xillion.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    environment:
      BACKEND_URL: http://backend:8001
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    depends_on:
      - backend

# ── Production (single container) ─────────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

volumes:
  xillion-data:
